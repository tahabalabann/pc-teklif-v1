server {
    listen 80;
    server_name pcteklif.com.tr;
    return 301 https://www.pcteklif.com.tr$request_uri;
}

server {
    listen 80;
    server_name www.pcteklif.com.tr;
    return 301 https://www.pcteklif.com.tr$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pcteklif.com.tr;
    return 301 https://www.pcteklif.com.tr$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.pcteklif.com.tr;

    root /var/www/pc-teklif-v1/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/pcteklif.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pcteklif.com.tr/privkey.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }
}
